name: ClaudeUsageMac
options:
  bundleIdPrefix: com.wantai
  deploymentTarget:
    macOS: "13.0"
targets:
  ClaudeUsageMac:
    type: application
    platform: macOS
    sources:
      - path: ClaudeUsageMac
        excludes:
          - Info.plist
      - path: pysrc
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wantai.claudeusage
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ClaudeUsageMac/Info.plist
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
